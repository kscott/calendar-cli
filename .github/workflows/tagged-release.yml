name: Tagged Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --product calendar-bin

      - name: Rename binary
        run: cp .build/release/calendar-bin calendar-bin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Install

            1. Download `calendar-bin` below
            2. Move it to `~/bin/calendar-bin` (create `~/bin` if needed)
            3. Make it executable: `chmod +x ~/bin/calendar-bin`
            4. On first run, macOS will prompt for Calendar access

            See the [README](https://github.com/kscott/calendar-cli#readme) for full setup instructions.
          files: calendar-bin
          make_latest: true
